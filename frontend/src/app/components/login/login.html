<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
    <div class="text-center mb-4">
      <i class="bi bi-box-seam text-primary fs-1"></i>
      <h3 class="mt-2">Storage System</h3>
      <p class="text-muted text-sm">Log in to manage active inventory stock</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger p-2 small">{{ errorMessage }}</div>

    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label font-weight-bold small">Username</label>
        <input type="text" name="username" [(ngModel)]="credentials.username" class="form-control" required
          placeholder="Enter username">
      </div>
      <div class="mb-4">
        <label class="form-label font-weight-bold small">Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" class="form-control" required
          placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
    </form>
  </div>
</div>
