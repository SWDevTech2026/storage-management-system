<div class="container py-5">
  <div class="mb-4">
    <button class="btn btn-outline-secondary btn-sm" routerLink="/dashboard">
      <i class="bi bi-arrow-left-circle me-1"></i> Back to Dashboard
    </button>
  </div>

  <div class="card mx-auto shadow-sm" style="max-width: 550px;">
    <div class="card-header bg-dark text-white p-3">
      <h5 class="mb-0"><i class="bi bi-person-gear me-2 text-warning"></i>Administrative Identity Management Console
      </h5>
    </div>
    <div class="card-body p-4">
      <p class="text-muted small">Registered staff accounts will be able to process logs, add catalog groups, and adjust
        current active counts.</p>

      <div *ngIf="successMessage" class="alert alert-success p-2 small"><i class="bi bi-check2-circle me-1"></i>{{
        successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger p-2 small"><i
          class="bi bi-exclamation-triangle-fill me-1"></i>{{ errorMessage }}</div>

      <form (ngSubmit)="onRegisterUser()">
        <div class="mb-3">
          <label class="form-label small fw-bold">Operator Username</label>
          <input type="text" [(ngModel)]="userForm.username" name="username" class="form-control" required
            placeholder="Ex: OperatorName">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Corporate Contact Email</label>
          <input type="email" [(ngModel)]="userForm.email" name="email" class="form-control"
            placeholder="name@company.com">
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold">Initial Access Password</label>
          <input type="password" [(ngModel)]="userForm.password" name="password" class="form-control" required
            placeholder="Choose safe alphanumeric password">
        </div>
        <button type="submit" class="btn btn-warning w-100 py-2 fw-semibold">
          <i class="bi bi-shield-plus me-1"></i> Authorize New Account
        </button>
      </form>
    </div>
  </div>
</div>
